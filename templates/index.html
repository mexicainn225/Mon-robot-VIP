<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLATEFORME</title>
    <style>
        body { background-color: #0e1015; color: white; padding: 20px; font-family: sans-serif; }
        .games-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .game-card { background: #151822; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #333; }
    </style>
</head>
<body>
    <h1 style="text-align:center;">SIGNAL GAME</h1>
    <div class="games-grid">
        <div class="game-card" onclick="alert('Signal : 🎯 2.50x')">Lucky Jet</div>
        <div class="game-card" onclick="alert('Signal : 🎯 3.20x')">Aviator</div>
        <div class="game-card" onclick="alert('Signal : 🎯 1.85x')">Crash</div>
    </div>
</body>
</html>
