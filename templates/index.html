<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNAL MEXICAIN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0e1015; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .games-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card { border-radius: 14px; aspect-ratio: 1/1.4; background-size: cover; cursor: pointer; border: 1px solid #333; background-color: #1c1f26; }
        #interface { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#0e1015; }
        .box { background:#1c1f26; padding:20px; border-radius:15px; margin:20px; border:1px solid #333; }
        .btn { padding: 15px 40px; border-radius: 30px; border:none; font-weight:bold; cursor:pointer; width:80%; margin-top:10px; }
    </style>
</head>
<body>
<div id="app">Vérification...</div>
<div id="main-content" style="display:none;">
    <div class="games-grid">
        <div class="card" onclick="ouvrir('Lucky Jet')">Lucky Jet</div>
        <div class="card" onclick="ouvrir('Aviator')">Aviator</div>
        <div class="card" onclick="ouvrir('1win Crash')">1win Crash</div>
    </div>
    <div id="interface">
        <h2 id="titre"></h2>
        <div id="res" class="box" style="display:none;">
            <p>Cote cible</p>
            <div id="cote" style="font-size:32px; color:#00ffcc; font-weight:bold;">--</div>
            <p>Début du signal: <span id="heure">--</span></p>
        </div>
        <button class="btn" style="background:#00ffcc" onclick="calc()">DEMANDER SIGNAL</button>
        <button class="btn" style="background:#fff" onclick="document.getElementById('interface').style.display='none'">RETOUR</button>
    </div>
</div>
<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    async function check() {
        const id = tg.initDataUnsafe?.user?.id.toString();
        const res = await fetch('/verifier-vip', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ player_id: id }) });
        if(res.status === 200) { document.getElementById('app').style.display='none'; document.getElementById('main-content').style.display='block'; }
        else { document.getElementById('app').innerHTML = "<h1>ACCÈS REFUSÉ</h1>"; }
    }
    check();
    function ouvrir(n) { document.getElementById('titre').innerText = n; document.getElementById('interface').style.display = 'block'; }
    function calc() {
        document.getElementById('res').style.display = 'block';
        document.getElementById('cote').innerText = (Math.random() * 5 + 1.5).toFixed(2) + "x";
        const d = new Date(); document.getElementById('heure').innerText = d.getHours() + ":" + d.getMinutes();
    }
</script>
</body>
</html>
