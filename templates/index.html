<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIGNAL GAME</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0e1015; color: #ffffff; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; text-align: center; }
        .games-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .game-card { background: #1c1f26; border-radius: 14px; padding: 20px 5px; cursor: pointer; border: 1px solid #333; font-size: 12px; font-weight: bold; }
        #interface-signal { display: none; }
        .result-container { background: #1c1f26; padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid #333; }
        .cote-value { color: #00ffcc; font-size: 32px; font-weight: bold; margin: 10px 0; }
        .btn-action { background: #00ffcc; color: #0e1015; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; width: 100%; margin-bottom: 10px; }
        .btn-back { background: #e0e0e0; color: #333; border: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1>PLATEFORME VIP</h1>
        <div class="games-grid">
            <div class="game-card" onclick="ouvrirJeu('Lucky Jet')">Lucky Jet</div>
            <div class="game-card" onclick="ouvrirJeu('Rocket Queen')">Rocket Queen</div>
            <div class="game-card" onclick="ouvrirJeu('1win Crash')">1win Crash</div>
            <div class="game-card" onclick="ouvrirJeu('Tropicana')">Tropicana</div>
            <div class="game-card" onclick="ouvrirJeu('Fortune Crash')">Fortune Crash</div>
            <div class="game-card" onclick="ouvrirJeu('Meta Crash')">Meta Crash</div>
            <div class="game-card" onclick="ouvrirJeu('Empire Crime')">Empire Crime</div>
            <div class="game-card" onclick="ouvrirJeu('Astronaut')">Astronaut</div>
            <div class="game-card" onclick="ouvrirJeu('Aviator')">Aviator</div>
        </div>
    </div>

    <div id="interface-signal">
        <h2 id="nom-jeu"></h2>
        <div class="result-container">
            <div style="color: #888;">Cote cible</div>
            <div id="cote-cible" class="cote-value">-</div>
            <div id="heure-signal" style="font-size: 14px; margin: 5px 0;"></div>
            <div id="fiabilite" style="font-size: 14px; margin: 5px 0;"></div>
        </div>
        <button class="btn-action" onclick="lancerCalcul()">DEMANDER SIGNAL</button>
        <button class="btn-back" onclick="fermerJeu()">RETOUR</button>
    </div>

    <script>
        const config = {
            "Lucky Jet": {"fiabilite": 1.5, "delai": 30},
            "Rocket Queen": {"fiabilite": 2, "delai": 50},
            "1win Crash": {"fiabilite": 2, "delai": 50},
            "Tropicana": {"fiabilite": 2, "delai": 50},
            "Fortune Crash": {"fiabilite": 2, "delai": 50},
            "Meta Crash": {"fiabilite": 2, "delai": 50},
            "Empire Crime": {"fiabilite": 2, "delai": 50},
            "Astronaut": {"fiabilite": 2, "delai": 50},
            "Aviator": {"fiabilite": 2, "delai": 50}
        };

        let jeuActuel = "";

        function ouvrirJeu(nom) {
            jeuActuel = nom;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('interface-signal').style.display = 'block';
            document.getElementById('nom-jeu').innerText = nom;
            document.getElementById('cote-cible').innerText = "-";
            document.getElementById('heure-signal').innerText = "";
            document.getElementById('fiabilite').innerText = "";
        }

        function fermerJeu() {
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('interface-signal').style.display = 'none';
        }

        function lancerCalcul() {
            const conf = config[jeuActuel];
            const display = document.getElementById('cote-cible');
            display.innerText = "Calcul...";
            
            setTimeout(() => {
                const cote = (Math.random() * (20 - 10) + 10).toFixed(2);
                const now = new Date();
                const timeString = now.toLocaleTimeString('fr-FR', { hour12: false });
                
                display.innerText = cote + "x";
                document.getElementById('heure-signal').innerText = "Début du signal: " + timeString + " UTC";
                document.getElementById('fiabilite').innerText = "Fiabilité: " + conf.fiabilite;
            }, 1000);
        }
    </script>
</body>
</html>
