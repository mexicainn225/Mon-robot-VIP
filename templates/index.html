<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLATEFORME VIP</title>
    <style>
        body { background-color: #0e1015; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
        #main-menu { display: none; width: 100%; padding: 20px; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 style="text-align:center;">PLATEFORME VIP</h1>
        </div>

    <script>
        async function verifierVIP() {
            const playerId = prompt("Entrez votre ID joueur :");
            if (!playerId) { document.body.innerHTML = "<h1>ACCÈS REQUIS</h1>"; return; }

            try {
                const res = await fetch('/verifier-vip', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({player_id: playerId})
                });

                if (res.status === 200) {
                    document.getElementById('main-menu').style.display = 'block';
                } else {
                    document.body.innerHTML = "<h1 style='color:red;'>ACCÈS REFUSÉ</h1>";
                }
            } catch (e) {
                document.body.innerHTML = "<h1>Erreur serveur</h1>";
            }
        }
        window.onload = verifierVIP;
    </script>
</body>
</html>
