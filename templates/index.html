<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SIGNAL MEXICAIN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>body { background: #0e1015; color: #fff; text-align: center; font-family: sans-serif; }</style>
</head>
<body>
    <div id="app-container"><h2>Vérification en cours...</h2></div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        const userId = tg.initDataUnsafe?.user?.id || "0"; 

        async function check() {
            const res = await fetch('/verifier-vip', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ player_id: userId })
            });
            document.getElementById('app-container').innerHTML = (res.status === 200) ? 
                "<h2>INTERFACE VIP</h2><p>Tous les signaux sont disponibles.</p>" : 
                "<h2 style='color:red'>ACCÈS REFUSÉ</h2><p>Veuillez contacter l'admin.</p>";
        }
        check();
    </script>
</body>
</html>
