<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLATEFORME</title>
    <style>
        body { background-color: #0e1015; color: white; padding: 20px; font-family: sans-serif; }
        .games-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .game-card { background: #151822; padding: 20px; border-radius: 10px; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 style="text-align:center;">PLATEFORME</h1>
        <div class="games-grid">
            <div class="game-card" onclick="ouvrirJeu('Lucky Jet')">Lucky Jet</div>
            <div class="game-card" onclick="ouvrirJeu('Aviator')">Aviator</div>
            </div>
    </div>

    <script>
        function ouvrirJeu(nom) {
            alert("Signal pour " + nom + " : 🎯 2.50x");
        }
    </script>
</body>
</html>
