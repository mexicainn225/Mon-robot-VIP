<!DOCTYPE html>
<html>
<head><script src="https://telegram.org/js/telegram-web-app.js"></script></head>
<body>
    <div id="app">Vérification en cours...</div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        let pid = localStorage.getItem('pid') || tg.initDataUnsafe?.user?.id;

        async function check() {
            if(!pid) { pid = prompt("Entrez votre ID 1win :"); localStorage.setItem('pid', pid); }
            const res = await fetch('/verifier-vip', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({player_id: pid}) });
            
            if (res.status === 200) {
                document.getElementById('app').innerHTML = `
                    <h1>INTERFACE VIP</h1>
                `;
            } else {
                document.getElementById('app').innerHTML = "<h1>EN ATTENTE DE VALIDATION...</h1>";
            }
        }
        check();
    </script>
</body>
</html>
