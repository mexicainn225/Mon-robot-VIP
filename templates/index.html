<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLATEFORME VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Design Global */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #0e1015; color: #ffffff; padding: 16px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Menu caché par défaut */
        #main-menu { display: none; width: 100%; }
        
        /* Grille des jeux */
        .games-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .game-card { border-radius: 14px; aspect-ratio: 1 / 1.4; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 10px; cursor: pointer; background-color: #151822; font-size: 10px; font-weight: bold; text-transform: uppercase; text-align: center; border: 1px solid #333; }
        
        /* Interface Signal */
        #interface-signal { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .game-icon-small { width: 80px; height: 80px; border-radius: 50%; background-color: #333; border: 3px solid #00ffcc; margin-bottom: 15px; }
        .result-box { background: #1c1f26; padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid #333; font-size: 24px; font-weight: bold; min-width: 200px; text-align: center; }
        
        /* Boutons */
        .btn-action { margin-top: 10px; padding: 15px 30px; font-size: 16px; font-weight: bold; border-radius: 30px; border: none; cursor: pointer; width: 80%; }
        .btn-signal { background: #00ffcc; color: #0e1015; }
        .btn-back { background: #333; color: white; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 style="text-align:center; margin-bottom: 20px;">PLATEFORME VIP</h1>
        <div class="games-grid">
            <div class="game-card" onclick="ouvrirJeu('Lucky Jet')">Lucky Jet</div>
            <div class="game-card" onclick="ouvrirJeu('Rocket Queen')">Rocket Queen</div>
            <div class="game-card" onclick="ouvrirJeu('1win Crash')">1win Crash</div>
            <div class="game-card" onclick="ouvrirJeu('Tropicana')">Tropicana</div>
            <div class="game-card" onclick="ouvrirJeu('Fortune Crash')">Fortune Crash</div>
            <div class="game-card" onclick="ouvrirJeu('Meta Crash')">Meta Crash</div>
            <div class="game-card" onclick="ouvrirJeu('Empire Crime')">Empire Crime</div>
            <div class="game-card" onclick="ouvrirJeu('Astronaut')">Astronaut</div>
            <div class="game-card" onclick="ouvrirJeu('Aviator')">Aviator</div>
        </div>
    </div>

    <div id="interface-signal">
        <div id="game-icon" class="game-icon-small"></div>
        <h2 id="nom-jeu-titre"></h2>
        <div id="resultat-affichage" class="result-box">En attente...</div>
        <button class="btn-action btn-signal" onclick="lancerCalcul()">DEMANDER SIGNAL</button>
        <button class="btn-action btn-back" onclick="fermerJeu()">RETOUR</button>
    </div>

    <script>
        // Vérification avec mémorisation
        async function verifierVIP() {
            let playerId = localStorage.getItem('userPlayerId');

            if (!playerId) {
                playerId = prompt("Entrez votre ID joueur :");
                if (!playerId) { document.body.innerHTML = "<h1>ACCÈS REQUIS</h1>"; return; }
            }

            try {
                const res = await fetch('/verifier-vip', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({player_id: playerId})
                });

                if (res.status === 200) {
                    localStorage.setItem('userPlayerId', playerId);
                    document.getElementById('main-menu').style.display = 'block';
                } else {
                    localStorage.removeItem('userPlayerId');
                    document.body.innerHTML = "<h1 style='color:red; text-align:center;'>ACCÈS REFUSÉ</h1>";
                }
            } catch (e) {
                document.body.innerHTML = "<h1 style='text-align:center;'>Erreur de connexion.</h1>";
            }
        }

        function ouvrirJeu(nom) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('interface-signal').style.display = 'flex';
            document.getElementById('nom-jeu-titre').innerText = nom;
        }

        function fermerJeu() {
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('interface-signal').style.display = 'none';
        }

        function lancerCalcul() {
            const resBox = document.getElementById('resultat-affichage');
            resBox.innerText = "Calcul en cours...";
            setTimeout(() => {
                resBox.innerText = "🎯 " + (Math.random() * (10 - 1.2) + 1.2).toFixed(2) + "x";
            }, 1500);
        }

        window.onload = verifierVIP;
    </script>
</body>
</html>
