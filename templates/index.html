<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLATEFORME VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Styles Généraux */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0e1015; color: #ffffff; padding: 16px; min-height: 100vh; text-align: center; }

        /* --- MENU PRINCIPAL (GRILLE) --- */
        #main-menu h1 { margin-bottom: 20px; font-size: 24px; }
        
        .games-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        
        /* Style des cartes avec image de fond */
        .game-card { 
            border-radius: 14px; 
            aspect-ratio: 1 / 1.4; /* Ratio vertical comme sur ton image */
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; /* Texte en bas */
            align-items: center; 
            padding-bottom: 10px; 
            cursor: pointer; 
            background-size: cover; 
            background-position: center; 
            background-color: #151822; /* Couleur de fond si l'image charge pas */
            font-size: 10px; 
            font-weight: bold; 
            text-transform: uppercase; 
            border: 1px solid #333; 
        }

        /* Chemins des images (Flask/Jinja2) - Assigne chaque classe à son image */
        .g164 { background-image: url("{{ url_for('static', filename='IMG_0164.WEBP') }}"); }
        .g165 { background-image: url("{{ url_for('static', filename='IMG_0165.WEBP') }}"); }
        .g166 { background-image: url("{{ url_for('static', filename='IMG_0166.WEBP') }}"); }
        .g167 { background-image: url("{{ url_for('static', filename='IMG_0167.WEBP') }}"); }
        .g168 { background-image: url("{{ url_for('static', filename='IMG_0168.WEBP') }}"); }
        .g170 { background-image: url("{{ url_for('static', filename='IMG_0170.WEBP') }}"); }
        .g171 { background-image: url("{{ url_for('static', filename='IMG_0171.WEBP') }}"); }
        .g172 { background-image: url("{{ url_for('static', filename='IMG_0172.WEBP') }}"); }
        .g173 { background-image: url("{{ url_for('static', filename='IMG_0173.WEBP') }}"); }

        /* --- INTERFACE DE SIGNAL (DÉTAIL) --- */
        #interface-signal { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; margin-top: 20px; }
        
        /* Icône ronde du jeu sélectionné */
        .game-icon-detail { width: 80px; height: 80px; border-radius: 50%; background-size: cover; background-position: center; border: 3px solid #00ffcc; margin: 0 auto 15px auto; }
        
        /* Bloc de résultat central */
        .result-container { background: #1c1f26; padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid #333; width: 90%; max-width: 350px; }
        .cote-label { color: #888; font-size: 14px; }
        .cote-value { color: #00ffcc; font-size: 32px; font-weight: bold; margin: 10px 0; }
        .info-row { font-size: 14px; color: #ccc; margin: 5px 0; }
        
        /* Boutons */
        .btn-action { background: #00ffcc; color: #0e1015; border: none; padding: 15px; border-radius: 30px; font-weight: bold; width: 90%; max-width: 350px; margin-bottom: 10px; cursor: pointer; font-size: 16px; text-transform: uppercase;}
        .btn-back { background: #e0e0e0; color: #333; border: none; padding: 15px; border-radius: 30px; font-weight: bold; width: 90%; max-width: 350px; cursor: pointer; font-size: 16px; text-transform: uppercase;}
    </style>
</head>
<body>

    <div id="main-menu">
        <h1>PLATEFORME VIP</h1>
        <div class="games-grid">
            <div class="game-card g164" onclick="ouvrirJeu('Lucky Jet', 'g164')">Lucky Jet</div>
            <div class="game-card g165" onclick="ouvrirJeu('Rocket Queen', 'g165')">Rocket Queen</div>
            <div class="game-card g166" onclick="ouvrirJeu('1win Crash', 'g166')">1win Crash</div>
            <div class="game-card g167" onclick="ouvrirJeu('Tropicana', 'g167')">Tropicana</div>
            <div class="game-card g168" onclick="ouvrirJeu('Fortune Crash', 'g168')">Fortune Crash</div>
            <div class="game-card g170" onclick="ouvrirJeu('Meta Crash', 'g170')">Meta Crash</div>
            <div class="game-card g171" onclick="ouvrirJeu('Empire Crime', 'g171')">Empire Crime</div>
            <div class="game-card g172" onclick="ouvrirJeu('Astronaut', 'g172')">Astronaut</div>
            <div class="game-card g173" onclick="ouvrirJeu('Aviator', 'g173')">Aviator</div>
        </div>
    </div>

    <div id="interface-signal">
        <div id="game-icon-detail" class="game-icon-detail"></div>
        <h2 id="nom-jeu"></h2>
        
        <div class="result-container">
            <div class="cote-label">Cote cible</div>
            <div id="cote-cible" class="cote-value">-</div>
            <div id="heure-signal" class="info-row"></div>
            <div id="fiabilite" class="info-row"></div>
        </div>

        <button class="btn-action" onclick="lancerCalcul()">DEMANDER SIGNAL</button>
        <button class="btn-back" onclick="fermerJeu()">RETOUR</button>
    </div>

    <script>
        // Ta configuration (Fiabilité et délais)
        const config = {
            "Lucky Jet": {"fiabilite": 1.5, "delai": 30},
            "Rocket Queen": {"fiabilite": 2, "delai": 50},
            "1win Crash": {"fiabilite": 2, "delai": 50},
            "Tropicana": {"fiabilite": 2, "delai": 50},
            "Fortune Crash": {"fiabilite": 2, "delai": 50},
            "Meta Crash": {"fiabilite": 2, "delai": 50},
            "Empire Crime": {"fiabilite": 2, "delai": 50},
            "Astronaut": {"fiabilite": 2, "delai": 50},
            "Aviator": {"fiabilite": 2, "delai": 50}
        };

        let jeuActuel = "";

        // Initialisation de la WebApp Telegram
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function ouvrirJeu(nom, classeImage) {
            jeuActuel = nom;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('interface-signal').style.display = 'flex'; // Utilise flex pour le centrage
            document.getElementById('nom-jeu').innerText = nom;
            
            // Applique l'image correspondante à l'icône ronde de détail
            document.getElementById('game-icon-detail').className = 'game-icon-detail ' + classeImage;

            // Réinitialisation de l'affichage
            document.getElementById('cote-cible').innerText = "-";
            document.getElementById('heure-signal').innerText = "";
            document.getElementById('fiabilite').innerText = "";
        }

        function fermerJeu() {
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('interface-signal').style.display = 'none';
        }

        function lancerCalcul() {
            const conf = config[jeuActuel];
            const display = document.getElementById('cote-cible');
            display.innerText = "Calcul...";

            setTimeout(() => {
                // Cote aléatoire 10+
                const cote = (Math.random() * (20 - 10) + 10).toFixed(2);
                
                // Heure actuelle formatée HH:MM:SS
                const now = new Date();
                const timeString = now.toTimeString().split(' ')[0];

                display.innerText = cote + "x";
