<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLATEFORME VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #0e1015; color: #ffffff; padding: 16px; min-height: 100vh; }
        .games-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .game-card { border-radius: 14px; aspect-ratio: 1 / 1.4; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 10px; cursor: pointer; background-size: cover; background-position: center; background-color: #151822; font-size: 10px; font-weight: bold; text-transform: uppercase; text-align: center; }
        
        /* Utilisation correcte des chemins static */
        .g164 { background-image: url("{{ url_for('static', filename='IMG_0164.WEBP') }}"); }
        .g165 { background-image: url("{{ url_for('static', filename='IMG_0165.WEBP') }}"); }
        .g166 { background-image: url("{{ url_for('static', filename='IMG_0166.WEBP') }}"); }
        .g167 { background-image: url("{{ url_for('static', filename='IMG_0167.WEBP') }}"); }
        .g168 { background-image: url("{{ url_for('static', filename='IMG_0168.WEBP') }}"); }
        .g170 { background-image: url("{{ url_for('static', filename='IMG_0170.WEBP') }}"); }
        .g171 { background-image: url("{{ url_for('static', filename='IMG_0171.WEBP') }}"); }
        .g172 { background-image: url("{{ url_for('static', filename='IMG_0172.WEBP') }}"); }
        .g173 { background-image: url("{{ url_for('static', filename='IMG_0173.WEBP') }}"); }
        
        #interface-signal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0e1015; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .content-overlay { text-align: center; width: 100%; padding: 20px; }
        .game-icon-small { width: 80px; height: 80px; border-radius: 50%; background-size: cover; background-position: center; border: 3px solid #00ffcc; margin: 0 auto 15px auto; }
        .result-box { background: #1c1f26; padding: 15px; border-radius: 15px; margin: 20px 0; display: none; border: 1px solid #333; }
        .btn-action { margin-top: 10px; padding: 15px 40px; font-size: 16px; font-weight: bold; border-radius: 30px; border: none; cursor: pointer; width: 80%; }
        .btn-signal { background: #00ffcc; color: #0e1015; }
    </style>
</head>
<body>
    <div id="main-menu" style="display:none;">
        <h1 style="text-align:center; margin-bottom:20px;">PLATEFORME VIP</h1>
        <div class="games-grid">
            <div class="game-card g164" onclick="ouvrirJeu('Lucky Jet', 'g164')">Lucky Jet</div>
            <div class="game-card g165" onclick="ouvrirJeu('Rocket Queen', 'g165')">Rocket Queen</div>
            <div class="game-card g166" onclick="ouvrirJeu('1win Crash', 'g166')">1win Crash</div>
            <div class="game-card g167" onclick="ouvrirJeu('Tropicana', 'g167')">Tropicana</div>
            <div class="game-card g168" onclick="ouvrirJeu('Fortune Crash', 'g168')">Fortune Crash</div>
            <div class="game-card g170" onclick="ouvrirJeu('Meta Crash', 'g170')">Meta Crash</div>
            <div class="game-card g171" onclick="ouvrirJeu('Empire Crime', 'g171')">Empire Crime</div>
            <div class="game-card g172" onclick="ouvrirJeu('Astronaut', 'g172')">Astronaut</div>
            <div class="game-card g173" onclick="ouvrirJeu('Aviator', 'g173')">Aviator</div>
        </div>
    </div>

    <div id="interface-signal">
        <div class="content-overlay">
            <div id="game-icon" class="game-icon-small"></div>
            <h2 id="nom-jeu-titre"></h2>
            <div id="resultat-affichage" class="result-box"></div>
            <button class="btn-action btn-signal" onclick="lancerCalcul()">DEMANDER SIGNAL</button>
            <button class="btn-action" onclick="location.reload()">RETOUR</button>
        </div>
    </div>

    <script>
        // Vérification VIP au chargement
        async function verifierVIP() {
            const playerId = prompt("Entrez votre ID de joueur pour accéder aux signaux :");
            if (!playerId) return verifierVIP(); // Relance si annulé

            const res = await fetch('/verifier-vip', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({player_id: playerId})
            });

            if (res.status === 200) {
                document.getElementById('main-menu').style.display = 'block';
                chargerConfig();
            } else {
                document.body.innerHTML = "<h1 style='text-align:center; margin-top:50px;'>ACCÈS REFUSÉ<br>Contactez le support.</h1>";
            }
        }
        verifierVIP();

        let configJeux = {};
        async function chargerConfig() {
            const response = await fetch("{{ url_for('static', filename='config.json') }}");
            configJeux = await response.json();
        }

        function ouvrirJeu(nom, classe) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('interface-signal').style.display = 'flex';
            document.getElementById('game-icon').className = 'game-icon-small ' + classe;
            document.getElementById('nom-jeu-titre').innerText = nom;
            window.currentGame = { nom };
        }

        function lancerCalcul() {
            const cfg = configJeux[currentGame.nom];
            if (!cfg) return alert("Configuration en cours...");
            // ... (ton code de calcul reste identique)
        }
    </script>
</body>
</html>
